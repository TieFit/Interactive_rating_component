<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <script src="js/script.js" defer></script>
</head>
<body>
  <div class="page">

    <!-- this state will be active until a rating is selected, and submit button pressed. It will be hidden
    when thank you state is active -->
    <div class="ratingState">
      <div class="star">
        <img class src="./images/icon-star.svg" alt="star icon">
      </div>
      <h2>How did we do?</h2>
      <p>Please let us know how we did with your support request. All feedback is appreciated 
        to help us improve our offering!
      </p>

      <div class="ratings">
        <button class="rating" data-rating="1">1</button>
        <button class="rating" data-rating="2">2</button>
        <button class="rating" data-rating="3">3</button>
        <button class="rating" data-rating="4">4</button>
        <button class="rating" data-rating="5">5</button>
      </div>
      <div class="submitButtonWrapper">
        <button class="submitButton">SUBMIT</button>
      </div>
    </div>

    <!-- this state stays hidden until rating has been selected, and submit button pressed -->
    <div class="thankYouState hidden">
      <div class="thankYouImgWrapper">
        <img class="thankYouImg" src="images/illustration-thank-you.svg" alt="thank_you">
      </div>
      <div class="selectedRatingWrapper">
        <h3 id="selectedRatingThanks"></h3>
      </div>
      <div class="thankYouWrapper">
        <h2>Thank You!</h2>
        <p>We appreciate you taking the time to give a rating. If you ever need more support, 
          don't hesitate to get in touch!</p>
      </div>
    </div>
  </div>
</body>
</html>
